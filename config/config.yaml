data:
  source_url: "https://github.com/PrimerAI/WikiNews-multilingual"
  raw_path: "data/raw"
  min_article_length: 100

topics:
  selected:
    - "Europe"
    - "Asia"
    - "Disasters and accidents"
  articles_per_topic_min: 10
  articles_per_topic_max: 20
  articles_per_topic_ner: 100     # NER pass only — Task 3 has no sample size limit

countries:
  selected:
    - "United States"
    - "Germany"

languages:
  ner: ["en", "de"]
  summarization: ["en"]

models:
  ner_english: "dslim/bert-base-NER"
  ner_german: "Davlan/bert-base-multilingual-cased-ner-hrl"
  spacy_english: "en_core_web_sm"
  spacy_german: "de_core_news_sm"
  summarization: "facebook/bart-large-cnn"
  similarity: "sentence-transformers/all-MiniLM-L6-v2"
  topic_prediction: "facebook/bart-large-mnli"

summarization:
  min_summary_length: 50
  max_summary_length: 200

ner:
  chunk_size: 400
  chunk_overlap: 50
  error_score_threshold: 0.6

topic_prediction:
  sample_size: 60     # Cap: matches full summarisation pool (3 topics × 20 articles, en only)
  hypothesis_template: "This news article is about {}."

similarity:
  threshold: 0.8

logging:
  log_file: "logs/pipeline.log"

random_seed: 42

# Device for all model inference. Options: "auto" (GPU if available, else CPU),
# "cpu" (force CPU), "cuda" (force GPU — raises if unavailable).
device: "auto"
